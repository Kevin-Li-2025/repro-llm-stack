name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-data-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and data extras
        run: |
          python -m pip install -U pip
          pip install ruff
          pip install -e ".[data]"

      - name: Ruff
        run: ruff check tools/

      - name: Dry run (strict)
        run: python tools/dry_run.py --recipe recipes/default.yaml --strict

      - name: Prepare data (capped)
        run: python tools/prepare_data.py --root . --max-sft 32 --max-dpo 32

      - name: Data quality report
        run: python tools/data_quality_report.py --root .

  eval-harness-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eval extras (pulls torch + lm-eval)
        run: |
          python -m pip install -U pip
          pip install -e ".[eval]"

      - name: lm-eval smoke (gpt2, tiny sample)
        run: |
          mkdir -p results/ci
          lm_eval --model hf \
            --model_args pretrained=gpt2,dtype=float32 \
            --tasks arc_easy \
            --limit 40 \
            --batch_size 4 \
            --output_path results/ci/lm_eval_gpt2.json

      - name: Summarize smoke eval
        run: |
          # lm-eval appends an ISO timestamp to .json output paths (see evaluation_tracker.save_results_aggregated).
          JSON=$(ls -t results/ci/lm_eval_gpt2_*.json 2>/dev/null | head -1)
          if [ -z "$JSON" ] || [ ! -f "$JSON" ]; then
            echo "Expected results/ci/lm_eval_gpt2_<timestamp>.json; got:" >&2
            ls -la results/ci >&2 || true
            exit 1
          fi
          python tools/summarize_lm_eval.py "$JSON" --out results/ci/SUMMARY.md

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lm-eval-smoke
          path: results/ci/*
