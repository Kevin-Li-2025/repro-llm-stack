name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and data extras
        run: |
          python -m pip install -U pip
          pip install ruff
          pip install -e ".[data]"

      - name: Ruff
        run: ruff check tools/

      - name: Dry run (strict)
        run: python tools/dry_run.py --recipe recipes/default.yaml --strict

      - name: Prepare data (capped)
        run: python tools/prepare_data.py --root . --max-sft 32 --max-dpo 32
