### model
# After SFT, this should point at the LoRA output directory from the SFT stage.
model_name_or_path: artifacts/checkpoints/qwen25_7b_lora_sft
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
pref_beta: 0.1
pref_loss: sigmoid

### dataset
dataset: repro_dpo
dataset_dir: artifacts/data
template: qwen
cutoff_len: 4096
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: artifacts/checkpoints/qwen25_7b_lora_dpo
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
